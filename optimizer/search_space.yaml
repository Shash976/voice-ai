# search_space.yaml — TinyMAC accelerator design-space optimizer
#
# sim_params   :  passed as CLI flags to the Verilator binary.
#                 The simulator measures them cycle-accurately.
#                 Adding a new sim param requires:  (1) a new flag in sim_main.cpp,
#                 (2) a rebuild in WSL, (3) moving it from proxy_params to here.
#
# proxy_params :  evaluated by reward.py analytic formulas only.
#                 No simulator run is performed for these; they are estimates.
#                 Currently: clock_period_ns (cycle→ns conversion + timing model),
#                            input/weight buffers (area/power model only).
#
# NOT in the optimizer (analytically fixed for TinyVAD):
#   dataflow:   output_stationary vs weight_stationary — MAC count is identical
#               for both; only area/routing differ, which belong in Stage-6 ORFS.
#   cpu_core:   picorv32 variant — not a TinyMAC accelerator parameter.
#   memory_size: fixed at 256 KB for Stage 4 firmware.

sim_params:
  mac_lanes:
    type: categorical
    choices: [1, 2, 4, 8, 16]
    default: 8
    flag: "--mac-lanes"
    description: "Parallel int8 MAC units; determines per-layer latency = ceil(MACs/lanes)"

  accumulator_width:
    type: categorical
    choices: [16, 24, 32]
    default: 32
    flag: "--acc-width"
    description: >
      Accumulator bit-width.  sim_main.cpp saturates the accumulator once per
      LANES-wide chunk (matching RTL semantics exactly: the int8_mac_array
      produces a psum for all active lanes in one S_MAC cycle, then acc_sat =
      saturate(acc + psum) is latched).  acc_width=16 produces hardware-accurate
      wrong outputs because narrow saturation destroys information on overflow.
      EMPIRICALLY VERIFIED 2026-06-01 (64 test vectors, 8 mac_lanes):
        int16: 47/64 correct  (73.4% — overflow confirmed in practice)
        int24: 64/64 correct  (safe for all TinyVAD layers)
        int32: 64/64 correct  (safe)
      Note: vec_0 alone is insufficient to detect int16 overflow — that vector
      happens to not trigger saturation.  Always test the full 64-vector suite.

proxy_params:
  # NOTE: these are NOT simulated.  They feed only the area/power/timing
  # proxy formulas in reward.py.  Results for these axes are estimates.

  clock_period_ns:
    type: categorical
    choices: [5, 10, 20]
    default: 10
    description: >
      Target clock period in ns.  Affects:
        - real_speedup: latency_ns = avg_cycles × max(clock_period, critical_path),
          real_speedup = SW_BASELINE_LATENCY_NS / latency_ns.  A FASTER clock that
          meets timing raises real_speedup (more reward); a clock faster than the
          critical path is capped (no free reward — see reward.effective_clock_ns).
        - power_proxy (∝ clock_frequency, uses the requested clock)
        - timing_slack (slack = clock_period - critical_path)
      critical_path is GDS-calibrated and LANES-independent (≈3.72 ns at 24b, the
      requantize Q31 multiply — see reward.critical_path_ns / docs/06).  So a 5 ns
      clock (200 MHz) MEETS timing at every lane count (Fmax ≈ 269 MHz); a violation
      only fires for an off-grid clock below the critical path.

  # input_buffer_bytes / weight_buffer_bytes were REMOVED from the active search
  # on 2026-06-02.  The behavioral Verilator sim reads directly from main RAM and
  # has NO buffer/cache model, so optimizing buffer sizes would be guessing
  # performance — which violates the Stage-5 principle "score real results, don't
  # guess".  SRAM area/timing becomes real in Stage-6 ORFS (ASAP7); the buffer
  # axes belong there.  reward.area_proxy still defaults both to 1024 B via .get(),
  # keeping the fixed 20% SRAM area term at its baseline value (area = 1.0 at the
  # baseline config).

# ── Reward function ──────────────────────────────────────────────────────────
# See reward.py for the full formula and implementation.
#
# Speedup uses log2 normalisation: log2(real_speedup)/log2(max_speedup), where
# real_speedup is the FREQUENCY-AWARE (ns-based) speedup, not the raw cycle ratio.
#   real_speedup=1.0   →  0.00  (break-even)
#   real_speedup=10    →  0.36  (perf floor — below this hits −8.0 penalty)
#   real_speedup=192   →  0.82  (8 lanes @ 10 ns)
#   real_speedup=480   →  0.97  (16 lanes @ 5 ns — fastest grid clock; meets timing)
#
# Area and power are SECONDARY — the optimizer's primary job is maximising
# speedup.  Area/power trade off only after speedup is good.
#
# Wall-clock sim time is intentionally NOT in the reward (non-reproducible).

reward:
  w_accuracy:          2.0
  w_speedup:           3.0
  w_area:             -0.4
  w_power:            -0.4
  w_timing_violation: -3.0
  # max_speedup is the log2 denominator for the speedup term.  It must cover the
  # full real_speedup range (frequency-aware), which is LARGER than the old
  # cycle-only range because a sub-10ns clock multiplies throughput.
  # DERIVATION (updated 2026-06-10 with MEASURED accel cycles from constants.py
  # AVG_CYCLES table; SW_BASELINE_LATENCY_NS = 11,196,638 × 10 ns):
  #   max feasible real_speedup = at lanes=16, acc=24 (smallest correct acc),
  #   effective_clock = max(5, critical_path=3.72) = 5.0 ns:
  #     accel_cycles  = AVG_CYCLES[16] = 46,670  (measured after V13 fix)
  #     latency_ns   = 46,670 × 5.0 = 233,350 ns
  #     real_speedup = 111,966,380 / 233,350 = 479.8×
  #   At the maximum, norm_spd = log2(479.8)/log2(576) = 8.906/9.170 = 0.971 (< 1, no clamp).
  #   576 safely bounds the max (≈20% headroom above 479.8×), so it is kept.
  #   Re-derive (measure_real.py) whenever the timing model, SW baseline,
  #   cycle model (sim_main.cpp), or lane set changes.
  max_speedup:        576.0
  min_useful_speedup:  10.0   # below 10× real-time speedup the overhead isn't worth the area
  perf_floor_penalty:  -8.0
