# search_space.yaml — TinyMAC accelerator design-space optimizer
#
# sim_params   :  passed as CLI flags to the Verilator binary.
#                 The simulator measures them cycle-accurately.
#                 Adding a new sim param requires:  (1) a new flag in sim_main.cpp,
#                 (2) a rebuild in WSL, (3) moving it from proxy_params to here.
#
# proxy_params :  evaluated by reward.py analytic formulas only.
#                 No simulator run is performed for these; they are estimates.
#                 Currently: clock_period_ns (cycle→ns conversion + timing model),
#                            input/weight buffers (area/power model only).
#
# NOT in the optimizer (analytically fixed for TinyVAD):
#   dataflow:   output_stationary vs weight_stationary — MAC count is identical
#               for both; only area/routing differ, which belong in Stage-6 ORFS.
#   cpu_core:   picorv32 variant — not a TinyMAC accelerator parameter.
#   memory_size: fixed at 256 KB for Stage 4 firmware.

sim_params:
  mac_lanes:
    type: categorical
    choices: [1, 2, 4, 8, 16]
    default: 8
    flag: "--mac-lanes"
    description: "Parallel int8 MAC units; determines per-layer latency = ceil(MACs/lanes)"

  accumulator_width:
    type: categorical
    choices: [16, 24, 32]
    default: 32
    flag: "--acc-width"
    description: >
      Accumulator bit-width.  sim_main.cpp saturates the accumulator per-MAC at
      runtime, so acc_width=16 produces hardware-accurate wrong outputs.
      EMPIRICALLY VERIFIED 2026-06-01 (64 test vectors, 8 mac_lanes):
        int16: 47/64 correct  (73.4% — overflow confirmed in practice)
        int24: 64/64 correct  (safe for all TinyVAD layers)
        int32: 64/64 correct  (safe)
      Note: vec_0 alone is insufficient to detect int16 overflow — that vector
      happens to not trigger saturation.  Always test the full 64-vector suite.

proxy_params:
  # NOTE: these are NOT simulated.  They feed only the area/power/timing
  # proxy formulas in reward.py.  Results for these axes are estimates.

  clock_period_ns:
    type: categorical
    choices: [5, 10, 20]
    default: 10
    description: >
      Target clock period in ns.  Affects:
        - power_proxy (∝ clock_frequency)
        - timing_slack (slack = clock_period - critical_path)
      The cycle-count speedup is frequency-independent, so this axis captures
      only the area/power/timing trade-off, not raw throughput.
      At 16 lanes + 5 ns: timing violation fires (critical_path > 5 ns).

  input_buffer_bytes:
    type: categorical
    choices: [256, 512, 1024, 2048, 4096]
    default: 1024
    description: >
      On-chip input SRAM size (proxy only — behavioral sim reads directly from
      main RAM with no cache model).  Contributes to area_proxy (20% weight).

  weight_buffer_bytes:
    type: categorical
    choices: [256, 512, 1024, 2048, 4096]
    default: 1024
    description: >
      On-chip weight SRAM size (proxy only — same caveat as input_buffer_bytes).

# ── Reward function ──────────────────────────────────────────────────────────
# See reward.py for the full formula and implementation.
#
# Speedup uses log2 normalisation: log2(speedup)/log2(max_speedup).
#   speedup=0.6  → −0.10  (slower than SW — hits perf floor penalty)
#   speedup=1.0  →  0.00  (break-even)
#   speedup=5.8  →  0.36  (realistic 8-lane behavioral)
#   speedup=191  →  0.99  (theoretical 8-lane with 0 overhead)
#
# Area and power are SECONDARY — the optimizer's primary job is maximising
# speedup.  Area/power trade off only after speedup is good.
#
# Wall-clock sim time is intentionally NOT in the reward (non-reproducible).

reward:
  w_accuracy:          2.0
  w_speedup:           3.0
  w_area:             -0.4
  w_power:            -0.4
  w_timing_violation: -3.0
  # max_speedup is the log2 denominator for the speedup term.
  # EMPIRICALLY MEASURED 2026-06-01:
  #   16 lanes → 257.7×  (SW=11.2M, accel=43,447 cycles, TinyVAD model)
  # Using 300 gives 15% headroom above the measured maximum.
  # Re-measure whenever the model changes: python3 measure_sweep.py
  max_speedup:        300.0
  min_useful_speedup:  10.0   # below 10× the overhead isn't worth the area
  perf_floor_penalty:  -8.0
