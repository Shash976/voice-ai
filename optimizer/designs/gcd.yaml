# optimizer/designs/gcd.yaml
# Design spec for the GCD (Greatest Common Divisor) example design.
#
# This is the ORFS shipped reference design — used as the proof of generality
# for the design-agnostic optimizer layer.  It has no RTL parameters, no
# functional evaluation hook, and is tiny (~200 cells).
#
# Source: /opt/OpenROAD-flow-scripts/flow/designs/src/gcd/gcd.v
# nangate45 reference config: /opt/OpenROAD-flow-scripts/flow/designs/nangate45/gcd/config.mk
#   CORE_UTILIZATION=55, PLACE_DENSITY_LB_ADDON=0.20, TNS_END_PERCENT=100
#   Reference constraint.sdc: set clk_period 0.46 (ns) → Fmax ~2.17 GHz target

name: gcd
top:  gcd

rtl_files:
  - /opt/OpenROAD-flow-scripts/flow/designs/src/gcd/gcd.v

clock_port: clk

# No RTL chparam axes (gcd has no configurable parameters).
params: {}

# nangate45: gcd is tiny, starts at sub-ns.
#   ORFS reference uses 0.46 ns (Fmax target ~2.17 GHz).
#   AutoTuner nangate45/gcd canonical range: [0.3, 1.0] ns.
#   We use a wider range [0.3, 2.0] to allow relaxed exploration.
# asap7: no asap7 SDC shipped in this ORFS install for gcd; not used.
platforms:
  nangate45:
    clock_range_ns: [0.3, 2.0]
    default_clock_ns: 0.6

# has_macros: false — gcd is a pure std-cell design.
has_macros: false

# functional_eval: none — gcd has no behavioral simulation hook.
# F0 is legality/validate_config only; F1 is skipped (functional_eval.kind != tinyvad_sim).
functional_eval:
  kind: none
